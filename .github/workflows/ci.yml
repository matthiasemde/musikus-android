name: CI

on:
  pull_request:
    # Triggers when a PR is opened, updated or labeled
    types: [opened, synchronize, reopened, unlabeled]

env:
    JAVA_VERSION: 17
    JAVA_DISTRO: 'zulu'

jobs:
  checks:
    name: Checks
    # Only run checks if the PR title does not start with 'docs:' and the PR does not have the 'skip-ci' label
    if: "${{ !startsWith(github.event.pull_request.title, 'docs:') && !contains(github.event.pull_request.labels.*.name, 'skip-ci') }}"
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRO }}
        cache: gradle

    - name: Check Gradle wrapper
      uses: gradle/wrapper-validation-action@v3

    - name: Check lint
      run: ./gradlew lint

    - name: Upload lint results
      uses: actions/upload-artifact@v4
      with:
        name: lint-results
        path: app/build/reports/lint-results-debug.html

  build:
    name: Build
    needs: checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRO }}
        cache: gradle

    - name: Build (Unit tests & Android tests)
      run: ./gradlew assembleDebug --stacktrace

    - name: Tar build files
      run: tar -cf build.tar app/build .gradle

    - name: Upload build tar
      uses: actions/upload-artifact@v4
      with:
          name: build
          path: build.tar

  unit-tests:
    name: Unit tests
    needs: build
    runs-on: ubuntu-latest

    steps: 
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRO }}
        cache: gradle

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: build
        path: .

    - name: Extract build files
      run: |
        tar -xf build.tar

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: unit-test-results
        path: app/build/reports/tests/testDebugUnitTest

  instrumentation-tests:
    name: Instrumentation tests
    # needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        api-level: [28, 29, 30, 31, 33, 35]
      fail-fast: false # make sure all tests finish, even if some fail

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run device tests
        run: ./gradlew api${{ matrix.api-level }}DebugAndroidTest --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation-test-results-${{ matrix.api-level }}
          path: app/build/reports/androidTests/connected/debug

  final-check:
    name: CI checks passed
    needs: [ checks, build, unit-tests, instrumentation-tests ]
    runs-on: ubuntu-latest

    steps:
      - name: All stages passed
        run: echo "All stages passed successfully! 🎉"
